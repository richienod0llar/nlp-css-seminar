# Notation key
notation:
  x:"grammatical subject (respondent or topic)"
  g:"government (subject)"
  o:"anyone / general subject"
  r:"respondent him/herself"
  I:"link verb (is/was/are)"
  P:"predicator(general)"
  C:"causal relationship (subject causes object)"
  D:"Deed / action"
  E:"Expectation"
  F:"feeling"
  FD:"future deed"
  "H(+I)":"has to / should + infinitive"
  HR:"Has the right to"
  J:"judgement"
  PR:"preference"
  S:"similarity or difference"
  e:"evaluative adjective"
  i:"importance adjective"
  f:"feeling noun/adjective"
  c:"cognitive judgement"
  ca:"causal marker"
  s:"similarity marker"
  pr:"preference marker"
  ri:"rights marker"
  d:"demographic descriptor"
  sc:"scale/classifier"
  ti:"time expression"
  pl:"place expression"
  qu:"quantity expression"
  pro:"procedure expression"
  y:"object / second entity"
  "y":(changed/affected entity)
  z:"comparison referent"

structures:
  1:"xIsc - subject + link verb + scale/classifier (e.g. "someone is bad")"
  2:"xPy - subject + predicator + object (e.g. "New laws have changed the position of women")"
  3:"xP - subject + predicator, no object (e.g. "Position of President has changed")"

Concepts:
  # --Subjective variables--
  Evaluation:
    type:subjective
    structures:
      1:"xIe"
      2:null
      3:null

